replicaCount: 1
service:
  type: ClusterIP
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: nostr.ichigo.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
persistence:
  enabled: false
relay:
  public_url: https://nostr.ichigo.dev